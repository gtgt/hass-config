- id: wc_light_off
  alias: "WC light off at sunrise"
  hide_entity: true
  trigger:
    platform: sun
    event: sunrise
    offset: "+00:00:00"
  action:
    - service: switch.turn_off
      data:
       entity_id: switch.apb_q4
- id: wc_light_on
  alias: "WC light on at sunset"
  hide_entity: true
  trigger:
    platform: sun
    event: sunset
    offset: "+00:00:00"
  action:
    - service: switch.turn_on
      data:
       entity_id: switch.apb_q4