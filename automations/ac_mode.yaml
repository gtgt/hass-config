  - id: 'ac_mode'
    hide_entity: true
    alias: AC mode
    trigger:
      - platform: state
        entity_id: climate.ac
    condition:
      condition: and
      conditions:
        - condition: template
          value_template: "{{ trigger.to_state.state != trigger.to_state.state }}"
        - condition: template
          value_template: "{{ trigger.to_state.state in ['off', 'heat', 'cool', 'heat_cool'] }}"
    action:
      - service: persistent_notification.create
        data_template:
          message: >
            Switch climate from {{ trigger.from_state.state }} to {{ trigger.to_state.state }}!
      - service: climate.set_hvac_mode
        data:
          entity_id: 
            - climate.ac_study
            - climate.ac_childa
            - climate.ac_childb
          hvac_mode: "{{ trigger.to_state.state }}"
          