- id: ac_ventillation_on
  alias: "Ventillation auto on"
  hide_entity: false
  initial_state: false
  trigger:
    - platform: numeric_state
      entity_id: sensor.io_temp_diff
      below: 16
  condition:
    condition: and
    conditions:
      - condition: state
        entity_id: switch.ac_relay_ventillation
        state: 'off'
  action:
    - service: switch.turn_on
      data:
       entity_id: switch.ac_relay_ventillation
    - service: notify.notify
      data_template:
        message: >
          Ventillation turned ON, since temp. difference is {{ states.sensor.livingroom_temp.state_with_unit }}!

- id: ac_ventillation_off
  alias: "Ventillation auto off"
  hide_entity: false
  trigger:
    - platform: numeric_state
      entity_id: sensor.io_temp_diff
      above: 16
  condition:
    condition: and
    conditions:
      - condition: state
        entity_id: switch.ac_relay_ventillation
        state: 'on'
  action:
    - service: switch.turn_off
      data:
       entity_id: switch.ac_relay_ventillation
    - service: notify.notify
      data_template:
        message: >
          Ventillation turned OFF, since temp. difference is {{ states.sensor.livingroom_temp.state_with_unit }}!