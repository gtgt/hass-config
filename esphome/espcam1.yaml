substitutions:
  name: espcam1

esphome:
  name: ${name}
  platform: ESP32
  board: esp32dev
  platformio_options:
    monitor_speed: 115200
    upload_speed: 921600

status_led:
  pin:
    number: GPIO2
    inverted: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:
  level: DEBUG
  logs:
    sensor: INFO
  baud_rate: 0

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: hatime

sensor:
  - platform: wifi_signal
    name: ${name}_wifi_signal
    update_interval: 10s

binary_sensor:
  - platform: status
    name: ${name}_status

esp32_camera:
  name: ${name}
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  reset_pin: GPIO32
  #power_down_pin: GPIO32
  #resolution: 800x600
  #idle_framerate: 0.1fps

output:
  - platform: gpio
    pin: GPIO4
    id: gpio04
light:
  - platform: binary
    output: gpio04
    name: ${name}_light
