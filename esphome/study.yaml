substitutions:
  name: study

esphome:
  name: ${name}
  platform: ESP8266
  board: d1_mini

status_led:
  pin:
    number: D4
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: now

dallas:
  - pin: D2 #GPIO4
    update_interval: 20s

sensor:
  - platform: dallas
    id: temp
    name: ${name}_temp
    address: 0xAFA86FA811646128
    filters:
      - offset: -3.2

  - platform: homeassistant
    id: target_temp
    entity_id: sensor.ac_${name}_target_temp
    internal: true

binary_sensor:
  - platform: homeassistant
    id: valve_state
    entity_id: sensor.ac_${name}_assumed_state
    internal: true

font:
  - file: '_fonts/slkscr.ttf'
    id: titlefont
    size: 8

  - file: '_fonts/BebasNeue-Regular.ttf'
    id: clockfont
    size: 24

  - file: '_fonts/NotoSans-Regular.ttf'
    id: valuefont
    size: 11

i2c:
  sda: D3 #GPIO0
  scl: D1 #GPIO5
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 128x32"
    reset_pin: D0
    address: 0x3C
    lambda: |-
      // Print "${name}" in top center.
      it.printf(64, 0, id(titlefont), TextAlign::TOP_CENTER, "${name}");

      // Print time in HH:MM format
      it.strftime(0, 30, id(clockfont), TextAlign::BASELINE_LEFT, "%H:%M", id(now).now());

      // Print inside temperature
      if (id(temp).has_state()) {
        it.printf(127, 8, id(valuefont), TextAlign::TOP_RIGHT , "%.1f°C", id(temp).state);
      }

      // Print target temperature
      if (id(target_temp).has_state()) {
        it.printf(127, 20, id(valuefont), TextAlign::BASELINE_RIGHT , "%.1f°C", id(target_temp).state);
      }