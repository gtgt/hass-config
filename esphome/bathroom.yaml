substitutions:
  name: bathroom

esphome:
  name: ${name}
  platform: ESP8266
  board: esp01_1m

#status_led:
#  pin:
#    number: GPIO2
#    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: now

sensor:
  - platform: dht
    model: DHT11
    pin: GPIO2
    update_interval: 4s
    temperature:
      id: temp
      name: ${name}_temp
      filters: 
        - sliding_window_moving_average:
            window_size: 15 
            send_every: 15 
            send_first_at: 15
        - offset: -1.0
    humidity:
      id: humidity
      name: ${name}_humidity
      filters: 
         - sliding_window_moving_average:
             window_size: 15 
             send_every: 15 
             send_first_at: 15
