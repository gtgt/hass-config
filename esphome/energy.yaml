substitutions:
  name: energy

esphome:
  name: ${name}
  platform: ESP8266
  board: d1_mini

status_led:
  pin:
    number: D4
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:
  level: INFO
  baud_rate: 0
  hardware_uart: UART1

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: now

uart:
  - id: ubus1
    rx_pin: D2
    tx_pin: D1
    baud_rate: 9600
    #stop_bits: 2
  - id: ubus2
    rx_pin: D6
    tx_pin: D5
    baud_rate: 9600
    #stop_bits: 2
  - id: ubus3
    rx_pin: GPIO3
    tx_pin: GPIO1
    baud_rate: 9600
    #stop_bits: 2

modbus:
  - id: mbus1
    uart_id: ubus1
  - id: mbus2
    uart_id: ubus2
  - id: mbus3
    uart_id: ubus3
    
sensor:
  - platform: pzemac
    modbus_id: mbus1
    address: 1
    current:
      name: ${name}_current1
    voltage:
      name: ${name}_voltage1
    energy:
      name: ${name}_energy1
    power:
      name: ${name}_power1
    frequency:
      name: ${name}_freq1
    power_factor:
      name: ${name}_pf1
    update_interval: 3s
  - platform: pzemac
    modbus_id: mbus2
    address: 2
    current:
      name: ${name}_current2
    voltage:
      name: ${name}_voltage2
    energy:
      name: ${name}_energy2
    power:
      name: ${name}_power2
    frequency:
      name: ${name}_freq2
    power_factor:
      name: ${name}_pf2
    update_interval: 3s
  - platform: pzemac
    modbus_id: mbus3
    address: 3
    current:
      name: ${name}_current3
    voltage:
      name: ${name}_voltage3
    energy:
      name: ${name}_energy3
    power:
      name: ${name}_power3
    frequency:
      name: ${name}_freq3
    power_factor:
      name: ${name}_pf3
    update_interval: 3s

switch:
  - platform: restart
    name: ${name}_restart
  - platform: uart
    uart_id: ubus1
    name: ${name}_reset1
    data: [0x01, 0x42, 0x80, 0x11]
  - platform: uart
    uart_id: ubus2
    name: ${name}_reset2
    data: [0x01, 0x42, 0x80, 0x11]
  - platform: uart
    uart_id: ubus3
    name: ${name}_reset3
    data: [0x01, 0x42, 0x80, 0x11]