substitutions:
  name: energy

esphome:
  name: ${name}
  platform: ESP8266
  board: d1_mini

status_led:
  pin:
    number: GPIO2
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:
  level: VERBOSE
  baud_rate: 9600
  #hardware_uart: UART1

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: now

uart:
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 9600
  stop_bits: 2

sensor:
  - platform: pzemac
    address: 2
    current:
      name: ${name}_current1
    voltage:
      name: ${name}_voltage1
    energy:
      name: ${name}_energy1
    power:
      name: ${name}_power1
    frequency:
      name: ${name}_freq1
    power_factor:
      name: ${name}_pf1
    update_interval: 3s
  - platform: pzemac
    address: 2
    current:
      name: ${name}_current2
    voltage:
      name: ${name}_voltage2
    energy:
      name: ${name}_energy2
    power:
      name: ${name}_power2
    frequency:
      name: ${name}_freq2
    power_factor:
      name: ${name}_pf2
    update_interval: 3s
  - platform: pzemac
    address: 3
    current:
      name: ${name}_current3
    voltage:
      name: ${name}_voltage3
    energy:
      name: ${name}_energy3
    power:
      name: ${name}_power3
    frequency:
      name: ${name}_freq3
    power_factor:
      name: ${name}_pf3
    update_interval: 3s
