substitutions:
  name: childb

esphome:
  name: ${name}
  platform: ESP8266
  board: d1_mini

status_led:
  pin:
    number: D4
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: now

dallas:
  - pin: D5 #GPIO14
    update_interval: 20s

sensor:
  - platform: dallas
    id: temp_outside
    name: ${name}_temp_outside
    address: 0x070316A279825328
    filters:
      - offset: 0
  - platform: dht
    model: AM2302
    pin: D3 #GPIO0
    temperature:
      id: temp
      name: ${name}_temp
      filters:
        - offset: 1
    humidity:
      id: humidity
      name: ${name}_humidity
    update_interval: 20s

  - platform: homeassistant
    id: target_temp
    entity_id: sensor.ac_childb_target_temp
    internal: true

binary_sensor:
  - platform: homeassistant
    id: valve_state
    entity_id: sensor.ac_childb_assumed_state
    internal: true

font:
  - file: '_fonts/slkscr.ttf'
    id: titlefont
    size: 8

  - file: '_fonts/BebasNeue-Regular.ttf'
    id: clockfont
    size: 20

  - file: '_fonts/NotoSans-Regular.ttf'
    id: valuefont
    size: 8

i2c:
  sda: D2 #GPIO?
  scl: D1 #GPIO5
  scan: false

display:
  - platform: ssd1306_i2c
    model: "SH1106 64x48"
    reset_pin: D0
    address: 0x3C
    lambda: |-
      // Print "${name}" in top center.
      it.printf(32, 0, id(titlefont), TextAlign::TOP_CENTER, "${name}");

      // Print time in HH:MM format
      it.strftime(0, 30, id(clockfont), TextAlign::BASELINE_LEFT, "%H:%M", id(now).now());

      // Print inside temperature
      if (id(temp).has_state()) {
        it.printf(63, 0, id(valuefont), TextAlign::TOP_RIGHT , "%.1f°C", id(temp).state);
      }

      // Print inside humidity
      if (id(humidity).has_state()) {
        it.printf(63, 12, id(valuefont), TextAlign::TOP_RIGHT , "%.1f%%", id(humidity).state);
      }

      // Print outside temperature
      if (id(temp_outside).has_state()) {
        it.printf(63, 24, id(valuefont), TextAlign::BASELINE_RIGHT , "%.1f°C", id(temp_outside).state);
      }

      // Print target temperature (from homeassistant sensor)
      if (id(target_temp).has_state()) {
        it.printf(63, 32, id(valuefont), TextAlign::BASELINE_RIGHT , "%.1f°C", id(target_temp).state);
      }