substitutions:
  name: controller1
  
esphome:
  name: ${name}
  platform: ESP32
  board: featheresp32
  platformio_options:
    monitor_speed: 115200
    upload_speed: 921600

status_led:
  pin:
    number: GPIO2
    inverted: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:
  baud_rate: 0

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: hatime

# We can still control the backlight independently
switch:
  - platform: gpio
    pin: GPIO4
    name: ${name}_backlight
    id: backlight

binary_sensor:
  - platform: status
    name: ${name}_status
    id: system_status
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: ${name}_button0
    id: button0
  - platform: gpio
    pin:
      number: GPIO35
      inverted: true
    name: ${name}_button1
    id: button1
    
spi:
  clk_pin: GPIO18
  mosi_pin: GPIO19


font:
  - file: '_fonts/slkscr.ttf'
    id: titlefont
    size: 24
  - file: '_fonts/BebasNeue-Regular.ttf'
    id: clockfont
    size: 48
  - file: '_fonts/NotoSans-Regular.ttf'
    id: valuefont
    size: 10

color:
  - id: red
    red: 100%
    green: 0%
    blue: 0%
  - id: yellow
    red: 100%
    green: 100%
    blue: 0%
  - id: green
    red: 0%
    green: 100%
    blue: 0%
  - id: blue
    red: 0%
    green: 0%
    blue: 100%
  - id: gray
    red: 50%
    green: 50%
    blue: 50%
    
display:
  - platform: st7789v
    backlight_pin: GPIO4
    cs_pin: GPIO5
    dc_pin: GPIO16
    reset_pin: GPIO23
    rotation: 270
    lambda: |-
      it.rectangle(0,  0, it.get_width(), it.get_height(), id(blue));
      it.rectangle(0, 20, it.get_width(), it.get_height(), id(blue));   // header bar

      it.strftime((240 / 2), (140 / 3) * 1 + 5, id(titlefont), id(gray), TextAlign::CENTER, "%Y-%m-%d", id(hatime).now());
      it.strftime((240 / 2), (140 / 3) * 2 + 5, id(clockfont), id(gray), TextAlign::CENTER, "%H:%M:%S", id(hatime).now());
      it.print(5, 5, id(valuefont), id(yellow), TextAlign::TOP_LEFT, "ESPHome");

      // Comment out the above lines to see the image without text overlaid
      // it.image(0, 0, id(my_image));

      if (id(system_status).state) {
        it.print(235, 5, id(valuefont), id(green), TextAlign::TOP_RIGHT, "Online");
      }
      else {
        it.print(235, 5, id(valuefont), id(red), TextAlign::TOP_RIGHT, "Offline");
      }
