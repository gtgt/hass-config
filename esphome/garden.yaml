substitutions:
  name: garden

esphome:
  name: ${name}
  platform: ESP8266
  board: esp01_1m

status_led:
  pin:
    number: GPIO2
    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:
  baud_rate: 0

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: hatime

i2c:
  sda: GPIO1
  scl: GPIO3
  scan: true
  
dallas:
  - pin: GPIO0
    update_interval: 20s
  
sensor:
  - platform: dallas
    id: temp0
    name: ${name}_temp_pool
    address: 0xAA02179245598028
    filters:
      - offset: 0

display:
  - platform: lcd_pcf8574
    dimensions: 16x2
    address: 0x3F
    update_interval: 1s
    lambda: |-
      if (id(temp0).has_state()) {
        it.printf("Tt: %.1f 'C", id(temp0).state);
      }
