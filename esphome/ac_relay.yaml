substitutions:
  name: ac_relay
  icon: "mdi:air-conditioner"

esphome:
  name: ${name}
  platform: ESP8266
  board: d1_mini
  
#status_led:
#  pin:
#    number: D4
#    inverted: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name} fallback hotspot"
    password: !secret ap_password

captive_portal:

# Enable logging
logger:

# Enable Web server
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Enable Home Assistant API
api:
  password: !secret api_password

ota:
  password: !secret ota_password

time:
  - platform: homeassistant
    id: hatime

switch:
  - platform: gpio
    id: study
    name: ${name}_study
    icon: ${icon}
    pin:
      number: D0 #16
      mode: OUTPUT
      inverted: yes
  - platform: gpio
    id: childa
    name: ${name}_childa
    icon: ${icon}
    pin:
      number: D6 #12
      mode: OUTPUT
      inverted: yes
  - platform: gpio
    id: childb
    name: ${name}_childb
    icon: ${icon}
    pin:
      number: D5 #14
      mode: OUTPUT
      inverted: yes
  - platform: gpio
    id: bedroom
    name: ${name}_bedroom
    icon: ${icon}
    pin:
      number: D7 #13
      mode: OUTPUT
      inverted: yes
  - platform: gpio
    id: kitchen
    name: ${name}_kitchen
    icon: ${icon}
    pin:
      number: D1 #5
      mode: OUTPUT
      inverted: yes
  - platform: gpio
    id: ventillation
    name: ${name}_ventillation
    icon: "mdi:fan"
    pin:
      number: D4
      mode: OUTPUT
      inverted: no

sensor:
# Extra sensor to keep track of plug uptime
  - platform: uptime
    id: up_time
    name: ${name}_up_time
    icon: "mdi:timelapse"
