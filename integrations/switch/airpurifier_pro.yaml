  - platform: template
    switches:
      airpurifier_pro_led:
        friendly_name: "Pufi LED"
        value_template: "{{ is_state_attr('fan.airpurifier_pro', 'led', true) }}"
        turn_on:
          service: xiaomi_miio.fan_set_led_on
          data:
            entity_id: fan.airpurifier_pro
        turn_off:
          service: xiaomi_miio.fan_set_led_off
          data:
            entity_id: fan.airpurifier_pro
        icon_template: "mdi:lightbulb-outline"
      airpurifier_pro_child_lock:
        friendly_name: "Pufi gyerekzár"
        value_template: "{{ is_state_attr('fan.airpurifier_pro', 'child_lock', true) }}"
        turn_on:
          service: xiaomi_miio.fan_set_child_lock_on
          data:
            entity_id: fan.airpurifier_pro
        turn_off:
          service: xiaomi_miio.fan_set_child_lock_off
          data:
            entity_id: fan.airpurifier_pro
        icon_template: "mdi:lock-outline"
      airpurifier_pro_buzzer:
        friendly_name: "Pufi hang"
        value_template: "{{ is_state_attr('fan.airpurifier_pro', 'buzzer', true) }}"
        turn_on:
          service: xiaomi_miio.fan_set_buzzer_on
          data:
            entity_id: fan.airpurifier_pro
        turn_off:
          service: xiaomi_miio.fan_set_buzzer_off
          data:
            entity_id: fan.airpurifier_pro
        icon_template: "mdi:volume-high"
