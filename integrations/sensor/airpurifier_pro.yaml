  - platform: template
    sensors:
      airpurifier_pro_temp:
        friendly_name: "Nappali hőmérséklet"
        value_template: "{{ state_attr('fan.airpurifier_pro', 'temperature') }}"
        unit_of_measurement: "°C"
        device_class: "temperature"
      airpurifier_pro_humidity:
        friendly_name: "Nappali Páratartalom"
        value_template: "{{ state_attr('fan.airpurifier_pro', 'humidity') }}"
        unit_of_measurement: "%"
        device_class: "humidity"
      airpurifier_pro_air_quality_pm25:
        friendly_name: "Nappali levegőminőség"
        value_template: "{{ state_attr('fan.airpurifier_pro', 'aqi') }}"
        unit_of_measurement: "μg/m³"
        icon_template: "mdi:weather-fog"
      airpurifier_pro_speed:
        friendly_name: "Pufi ventillátor sebesség"
        value_template: "{{ state_attr('fan.airpurifier_pro', 'motor_speed') }}"
        unit_of_measurement: "rpm"
        icon_template: "mdi:speedometer"
      airpurifier_pro_filter_remaining:
        friendly_name: "Pufi szűrő élettartam"
        value_template: "{{ state_attr('fan.airpurifier_pro', 'filter_life_remaining') }}"
        unit_of_measurement: "%"
        icon_template: "mdi:heart-outline"
