  - platform: file
    name: ac_default_target_temp
    file_path: /config/ac_default_target_temp.txt
  - platform: template
    sensors:
      livingroom_temp:
        value_template: "{{ state_attr('fan.pufi', 'temperature') }}"
      livingroom_humidity:
        value_template: "{{ state_attr('fan.pufi', 'humidity') }}"

      io_temp_diff:
        value_template: "{{ (states('sensor.livingroom_temp')|float - state_attr('weather.owm', 'temperature')|float)|round(1) }}"
        availability_template: "{{ states('sensor.livingroom_temp')|float > 0 and state_attr('weather.owm', 'temperature') != None }}"
        icon_template: "mdi:home-thermometer-outline"

      ac_study_target_temp:
        value_template: "{{ state_attr('climate.ac_study', 'temperature') }}"
        availability_template: "{{ states('climate.ac_study') != 'off' }}"
      ac_childa_target_temp:
        value_template: "{{ state_attr('climate.ac_childa', 'temperature') }}"
        availability_template: "{{ states('climate.ac_childa') != 'off' }}"
      ac_childb_target_temp:
        value_template: "{{ state_attr('climate.ac_childb', 'temperature') }}"
        availability_template: "{{ states('climate.ac_childb') != 'off' }}"
      ac_bedroom_target_temp:
        value_template: "{{ state_attr('climate.ac_bedroom', 'temperature') }}"
        availability_template: "{{ states('climate.ac_bedroom') != 'off' }}"
      ac_kitchen_target_temp:
        value_template: "{{ state_attr('climate.ac_kitchen', 'temperature') }}"
        availability_template: "{{ states('climate.ac_kitchen') != 'off' }}"
        
